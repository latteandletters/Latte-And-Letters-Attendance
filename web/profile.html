<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - Latte & Letters</title>
<link rel="stylesheet" href="css/style.css?v=profile-rows">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-icon"></div><span class="logo-text">Latte & Letters</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">-</div></div>
      </div>
      
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button type="button" class="btn-icon" onclick="toggleSidebar()">&#9776; Menu</button>
      <h2 class="page-title">My Profile</h2>
    </header>

    <div class="content-area">
      <div class="profile-layout">

        <!-- Left: Avatar card -->
        <div class="profile-avatar-card">
          <div class="profile-pic-wrap">
            <img id="profileImg" src="" alt="Profile" class="profile-pic hidden">
            <div id="profileInitial" class="profile-initial">?</div>
            <label class="profile-pic-overlay" for="picInput" title="Change photo">
              📷
            </label>
            <input type="file" id="picInput" accept=".jpg,.jpeg,.png,image/jpeg,image/png" class="hidden" onchange="handlePicture(this)">
          </div>
          <div class="profile-name" id="profileName">Loading...</div>
          <div class="profile-role-badge" id="profileRoleBadge">-</div>
          <div class="profile-meta" id="profileMeta"></div>
        <button type="button" class="btn btn-danger btn-sm profile-remove-photo-btn" onclick="removePicture()" id="removePicBtn" style="display:none">
            Remove Photo
          </button>
        </div>

        <!-- Right: Edit form -->
        <div class="profile-form-card">
          <div class="profile-tabs">
        <button type="button" class="profile-tab active" onclick="switchProfileTab('info', this)">Personal Info</button>
        <button type="button" class="profile-tab" onclick="switchProfileTab('security', this)">Change Password</button>
          </div>

          <!-- Info tab -->
          <div id="tab-info">
            <form id="profileForm" class="profile-form">
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" id="pFirstName" required>
                </div>
                <div class="form-group">
                  <label>Middle Name <span class="profile-optional">(Optional)</span></label>
                  <input type="text" id="pMiddleName">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" id="pLastName" required>
                </div>
                <div class="form-group">
                  <label>Suffix <span class="profile-optional">(Optional)</span></label>
                  <input type="text" id="pSuffix" placeholder="Jr, Sr, III" maxlength="20">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="pEmail">
                </div>
                <div class="form-group">
                  <label>Contact No.</label>
                  <input type="text" id="pPhone" placeholder="e.g. 09171234567">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Date of Birth</label>
                  <input type="date" id="pBirthDate">
                </div>
                <div class="form-group">
                  <label>Age</label>
                  <input type="text" id="pAge" placeholder="Auto computed" readonly>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Province</label>
                  <input type="text" id="pProvince" value="LAGUNA" readonly>
                </div>
                <div class="form-group">
                  <label>Municipality / City</label>
                  <select id="pMunicipality">
                    <option value="">Select municipality or city</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Barangay</label>
                  <select id="pBarangay" disabled>
                    <option value="">Select barangay</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Role</label>
                  <input type="text" id="pRoleDisplay" readonly>
                </div>
              </div>

              <!-- Staff-only fields -->
              <div id="studentFields" class="hidden">
                <div class="form-row">
                  <div class="form-group">
                    <label>Staff ID</label>
                    <input type="text" id="pStudentId" disabled>
                  </div>
                  <div class="form-group">
                    <label>Work Area</label>
                    <input type="text" id="pCourse">
                  </div>
                  <div class="form-group">
                    <label>Staff Level</label>
                    <select id="pYear">
                      <option value="1">Level 1 - Trainee</option>
                      <option value="2">Level 2 - Regular</option>
                      <option value="3">Level 3 - Senior</option>
                      <option value="4">Level 4 - Lead</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label>Shift Group</label>
                    <select id="pSection">
                      <option value="">Select shift group</option>
                      <option value="Opening (6am - 2pm)">Opening (6am - 2pm)</option>
                      <option value="Mid Shift (10am - 6pm)">Mid Shift (10am - 6pm)</option>
                      <option value="Closing (2pm - 10pm)">Closing (2pm - 10pm)</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Supervisor-only fields -->
              <div id="teacherFields" class="hidden">
                <div class="form-row">
                  <div class="form-group">
                    <label>Branch / Department</label>
                    <input type="text" id="pDept">
                  </div>
                  <div class="form-group">
                    <label>Assigned Area</label>
                    <input type="text" id="pSubject">
                  </div>
                </div>
              </div>

              <div id="profileErr" class="error-msg hidden"></div>
              <div class="profile-form-actions">
                <button type="button" class="btn btn-secondary" onclick="requestDiscardProfileChanges()">↺ Discard</button>
                <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
              </div>
            </form>

            <!-- OTP confirmation panel -->
            <div id="otpPanel" class="profile-otp-panel hidden">
              <p class="profile-otp-copy">
                A verification code has been sent to your email. Enter it to confirm your changes.
              </p>
              <div class="otp-inputs" id="profileOtpInputs">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
              </div>
              <div class="otp-timer profile-otp-timer">Expires in <span id="profileOtpCountdown">03:00</span></div>
              <div id="otpErr" class="error-msg profile-otp-error hidden"></div>
              <div class="profile-otp-actions">
                <button type="button" class="btn btn-secondary" onclick="cancelOtp()">Cancel</button>
                <button type="button" class="btn btn-primary" style="flex:1" id="confirmOtpBtn" onclick="confirmProfileOtp()">Confirm</button>
                <button type="button" class="btn btn-secondary btn-sm" id="profileResendBtn" onclick="resendProfileOtp()" disabled>Resend</button>
              </div>
            </div>


          </div>

          <!-- Security tab -->
          <div id="tab-security" class="hidden">
            <form id="passwordForm" class="profile-form profile-security-form">
              <div class="form-group">
                <label>Current Password</label>
                <div class="pass-wrap">
                  <input type="password" id="currentPass" placeholder="Enter current password">
                  <button type="button" class="toggle-pass" onclick="togglePass('currentPass',this)">👁</button>
                </div>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <div class="pass-wrap">
                  <input type="password" id="newPass" placeholder="At least 6 characters" minlength="6">
                  <button type="button" class="toggle-pass" onclick="togglePass('newPass',this)">👁</button>
                </div>
                <div class="password-strength profile-password-strength">
                  <div class="strength-fill" id="strengthFill"></div>
                </div>
                <small id="strengthLabel" class="field-hint"></small>
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <div class="pass-wrap">
                  <input type="password" id="confirmPass" placeholder="Repeat new password">
                  <button type="button" class="toggle-pass" onclick="togglePass('confirmPass',this)">👁</button>
                </div>
              </div>
              <div id="passErr" class="error-msg hidden"></div>
              <div class="profile-form-actions">
                <button type="submit" class="btn btn-primary">Update Password</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="js/laguna-addresses.js"></script>
<script src="js/app.js"></script>
<script>
  requireAuth();
  renderNav();

  const role = localStorage.getItem('role');
  let currentPicture = null;
  let profileData    = null;
  const lagunaLocationData = window.LAGUNA_LOCATION_DATA || { province: 'LAGUNA', municipalities: [] };
  const knownNameSuffixes = new Set(['JR', 'SR', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X']);

  function normalizeProfileSuffix(value) {
    const cleaned = String(value || '').trim().replace(/\./g, '');
    if (!cleaned) return '';
    const upper = cleaned.toUpperCase();
    return knownNameSuffixes.has(upper) ? upper : toNameCase(cleaned);
  }

  function splitProfileFullName(fullName = '') {
    const parts = String(fullName || '').trim().replace(/\s+/g, ' ').split(' ').filter(Boolean);
    let suffix = '';
    if (parts.length > 1) {
      const possibleSuffix = parts[parts.length - 1].replace(/\./g, '').toUpperCase();
      if (knownNameSuffixes.has(possibleSuffix)) suffix = parts.pop();
    }
    if (!parts.length) return { first_name: '', middle_name: '', last_name: '', suffix: normalizeProfileSuffix(suffix) };
    if (parts.length === 1) return { first_name: parts[0], middle_name: '', last_name: '', suffix: normalizeProfileSuffix(suffix) };
    return {
      first_name: parts[0],
      middle_name: parts.slice(1, -1).join(' '),
      last_name: parts[parts.length - 1],
      suffix: normalizeProfileSuffix(suffix)
    };
  }

  function getProfileNameParts() {
    return {
      first_name: document.getElementById('pFirstName').value.trim(),
      middle_name: document.getElementById('pMiddleName').value.trim(),
      last_name: document.getElementById('pLastName').value.trim(),
      suffix: normalizeProfileSuffix(document.getElementById('pSuffix').value)
    };
  }

  function buildProfileFullNameFromParts(parts) {
    return [parts.first_name, parts.middle_name, parts.last_name, parts.suffix]
      .map(value => String(value || '').trim())
      .filter(Boolean)
      .join(' ');
  }

  function getProfileFullNameFromFields() {
    return buildProfileFullNameFromParts(getProfileNameParts());
  }

  function setProfileNameFields(data = {}) {
    const fallback = splitProfileFullName(data.full_name || '');
    document.getElementById('pFirstName').value = data.first_name || fallback.first_name || '';
    document.getElementById('pMiddleName').value = data.middle_name || fallback.middle_name || '';
    document.getElementById('pLastName').value = data.last_name || fallback.last_name || '';
    document.getElementById('pSuffix').value = normalizeProfileSuffix(data.suffix || fallback.suffix || '');
  }

  function getLagunaMunicipalities() {
    return Array.isArray(lagunaLocationData.municipalities) ? lagunaLocationData.municipalities : [];
  }

  function repairLocationEncoding(value) {
    const text = String(value || '').trim();
    if (!text || !/[ÃÂâ]/.test(text)) return text;
    try {
      const percentEncoded = Array.from(text)
        .map(ch => '%' + ch.charCodeAt(0).toString(16).padStart(2, '0'))
        .join('');
      return decodeURIComponent(percentEncoded);
    } catch (error) {
      return text
        .replace(/Ã±/g, 'ñ')
        .replace(/Ã‘|Ã/g, 'Ñ')
        .replace(/Ã¡/g, 'á')
        .replace(/Ã©/g, 'é')
        .replace(/Ã­/g, 'í')
        .replace(/Ã³/g, 'ó')
        .replace(/Ãº/g, 'ú');
    }
  }

  function formatLocationLabel(value) {
    let label = repairLocationEncoding(value);
    if (!label) return '';
    label = label.replace(/\s+\(Capital\)$/i, '');
    if (/^CITY OF /i.test(label)) label = label.replace(/^CITY OF /i, '') + ' CITY';
    return label
      .toLowerCase()
      .replace(/\b([a-z\u00c0-\u00ff])/g, match => match.toUpperCase())
      .replace(/\bOf\b/g, 'of')
      .replace(/\bAnd\b/g, 'and');
  }

  function formatBarangayLabel(value) {
    return repairLocationEncoding(value).replace(/\s+/g, ' ').trim();
  }

  function populateProfileProvince() {
    const province = document.getElementById('pProvince');
    if (province) province.value = lagunaLocationData.province || 'LAGUNA';
  }

  function populateProfileMunicipalities(selectedCode = '', selectedName = '') {
    const municipality = document.getElementById('pMunicipality');
    if (!municipality) return;
    municipality.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = 'Select municipality or city';
    municipality.appendChild(placeholder);

    const normalizedSelectedName = formatLocationLabel(selectedName);
    let matchedCode = '';

    getLagunaMunicipalities().forEach(item => {
      const label = formatLocationLabel(item.name);
      const option = document.createElement('option');
      option.value = item.code;
      option.textContent = label;
      municipality.appendChild(option);
      if (!matchedCode && normalizedSelectedName && label === normalizedSelectedName) {
        matchedCode = item.code;
      }
    });

    municipality.value = selectedCode || matchedCode || '';
  }

  function getSelectedProfileMunicipalityData() {
    const code = document.getElementById('pMunicipality')?.value || '';
    return getLagunaMunicipalities().find(item => item.code === code) || null;
  }

  function getSelectedProfileMunicipalityLabel() {
    const item = getSelectedProfileMunicipalityData();
    return item ? formatLocationLabel(item.name) : '';
  }

  function parseProfileBirthDateValue(value) {
    const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec((value || '').trim());
    if (!match) return null;
    const year = Number(match[1]);
    const month = Number(match[2]);
    const day = Number(match[3]);
    const date = new Date(year, month - 1, day);
    if (
      date.getFullYear() !== year ||
      date.getMonth() !== month - 1 ||
      date.getDate() !== day
    ) {
      return null;
    }
    return { year, month, day };
  }

  function getProfileAgeFromBirthDate(value) {
    const parsed = parseProfileBirthDateValue(value);
    if (!parsed) return null;

    const today = new Date();
    let age = today.getFullYear() - parsed.year;
    const monthDiff = today.getMonth() - (parsed.month - 1);
    const dayDiff = today.getDate() - parsed.day;
    if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) age--;
    return age;
  }

  function updateProfileAgeField() {
    const ageInput = document.getElementById('pAge');
    const birthDateInput = document.getElementById('pBirthDate');
    if (!ageInput || !birthDateInput) return;
    const age = getProfileAgeFromBirthDate(birthDateInput.value);
    ageInput.value = Number.isInteger(age) && age >= 0 ? String(age) : '';
  }

  function getProfileBirthDateError(value) {
    if (!value) return 'Date of birth is required';
    const age = getProfileAgeFromBirthDate(value);
    if (age === null) return 'Enter a valid date of birth';
    if (age < 15 || age > 80) return 'Age must be between 15 and 80 years old';
    return null;
  }

  function populateProfileBarangays(municipalityCode = '', selectedBarangay = '') {
    const barangay = document.getElementById('pBarangay');
    if (!barangay) return;

    const municipality = getLagunaMunicipalities().find(item => item.code === municipalityCode);
    barangay.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = municipality ? 'Select barangay' : 'Select municipality or city first';
    barangay.appendChild(placeholder);

    if (!municipality) {
      barangay.disabled = true;
      barangay.value = '';
      return;
    }

    municipality.barangays.forEach(name => {
      const label = formatBarangayLabel(name);
      const option = document.createElement('option');
      option.value = label;
      option.textContent = label;
      barangay.appendChild(option);
    });

    barangay.disabled = false;
    barangay.value = formatBarangayLabel(selectedBarangay || '');
  }

  function initializeProfileLocationFields() {
    populateProfileProvince();
    populateProfileMunicipalities();
    populateProfileBarangays('');

    const municipality = document.getElementById('pMunicipality');
    municipality?.addEventListener('change', () => {
      populateProfileBarangays(municipality.value);
    });
  }

  // Show role-specific fields
  if (role === 'staff') document.getElementById('studentFields').classList.remove('hidden');
  if (role === 'supervisor') document.getElementById('teacherFields').classList.remove('hidden');
  bindAutoNameCase(['pFirstName', 'pMiddleName', 'pLastName']);
  document.getElementById('pSuffix')?.addEventListener('input', event => {
    event.target.value = normalizeProfileSuffix(event.target.value);
  });
  document.getElementById('pBirthDate')?.addEventListener('input', updateProfileAgeField);
  document.getElementById('pBirthDate')?.addEventListener('change', updateProfileAgeField);
  initializeProfileLocationFields();

  loadProfile();

  async function loadProfile() {
    const data = await API.get('/api/profile');
    if (!data || data.error) { showToast('Failed to load profile', 'error'); return; }
    profileData = data;
    applyProfileData(data);
    return;

    // Avatar
    currentPicture = data.profile_picture || null;
    renderAvatar(data.full_name, currentPicture);

    // Name + badge
    document.getElementById('profileName').textContent = data.full_name || '-';
    document.getElementById('profileRoleBadge').textContent = role.charAt(0).toUpperCase() + role.slice(1);

    // Meta info under avatar
    let meta = '';
    if (role === 'staff') meta = `${data.course || ''} - Level ${data.year_level || ''} - Shift ${data.section || ''}`;
    if (role === 'supervisor') meta = `${data.department || ''} · ${data.subject || ''}`;
    document.getElementById('profileMeta').textContent = meta;

    // Fill form
    setProfileNameFields(data);
    document.getElementById('pEmail').value    = data.email || data.account_email || '';
    document.getElementById('pPhone').value    = data.phone || '';
    document.getElementById('pBirthDate').value = data.date_of_birth || '';
    updateProfileAgeField();
    document.getElementById('pProvince').value = (data.province || lagunaLocationData.province || 'LAGUNA').toUpperCase();
    populateProfileMunicipalities('', data.municipality || '');
    populateProfileBarangays(document.getElementById('pMunicipality').value, data.barangay || '');

    if (role === 'staff') {
      document.getElementById('pStudentId').value = data.student_id || '';
      document.getElementById('pCourse').value    = data.course || '';
      document.getElementById('pYear').value      = data.year_level || '1';
      document.getElementById('pSection').value   = data.section || '';
    }
    if (role === 'supervisor') {
      document.getElementById('pDept').value    = data.department || '';
      document.getElementById('pSubject').value = data.subject || '';
    }

    // Show/hide remove button
    document.getElementById('removePicBtn').style.display = currentPicture ? 'inline-flex' : 'none';

    // Sync sidebar avatar with saved picture
    localStorage.setItem('profile_picture', currentPicture || '');
    const av = document.getElementById('userAvatar');
    if (av && currentPicture) {
      av.style.backgroundImage = `url(${currentPicture})`;
      av.style.backgroundSize  = 'cover';
      av.style.backgroundPosition = 'center';
      av.textContent = '';
    }
  }

  function buildProfileMeta(data) {
    if (role === 'staff') {
      return [
        data.course || '',
        formatYearLevelLabel(data.year_level),
        data.section ? `Shift ${data.section}` : ''
      ].filter(Boolean).join(' • ');
    }
    if (role === 'supervisor') {
      return [data.department || '', data.subject || ''].filter(Boolean).join(' • ');
    }
    return '';
  }

  function buildCleanProfileMeta(data) {
    if (role === 'staff') {
      return [
        data.course || '',
        formatYearLevelLabel(data.year_level),
        data.section ? `Shift ${data.section}` : ''
      ].filter(Boolean).join(' | ');
    }
    if (role === 'supervisor') {
      return [data.department || '', data.subject || ''].filter(Boolean).join(' | ');
    }
    return '';
  }

  function formatYearLevelLabel(value) {
    switch (String(value || '').trim()) {
      case '1': return 'Level 1';
      case '2': return 'Level 2';
      case '3': return 'Level 3';
      case '4': return 'Level 4';
      default: return value ? `Level ${value}` : '';
    }
  }

  function applyProfileData(data) {
    if (!data) return;

    currentPicture = data.profile_picture || null;
    renderAvatar(data.full_name, currentPicture);

    document.getElementById('profileName').textContent = data.full_name || '-';
    document.getElementById('profileRoleBadge').textContent = role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById('pRoleDisplay').value = role.charAt(0).toUpperCase() + role.slice(1);

    let meta = '';
    if (role === 'staff') meta = `${data.course || ''} - Level ${data.year_level || ''} - Shift ${data.section || ''}`;
    if (role === 'supervisor') meta = `${data.department || ''} Â· ${data.subject || ''}`;
    document.getElementById('profileMeta').textContent = buildCleanProfileMeta(data) || meta;

    setProfileNameFields(data);
    document.getElementById('pEmail').value    = data.email || data.account_email || '';
    document.getElementById('pPhone').value    = data.phone || '';
    document.getElementById('pBirthDate').value = data.date_of_birth || '';
    updateProfileAgeField();
    document.getElementById('pProvince').value = (data.province || lagunaLocationData.province || 'LAGUNA').toUpperCase();
    populateProfileMunicipalities('', data.municipality || '');
    populateProfileBarangays(document.getElementById('pMunicipality').value, data.barangay || '');

    if (role === 'staff') {
      document.getElementById('pStudentId').value = data.student_id || '';
      document.getElementById('pCourse').value    = data.course || '';
      document.getElementById('pYear').value      = data.year_level || '1';
      document.getElementById('pSection').value   = data.section || '';
    }
    if (role === 'supervisor') {
      document.getElementById('pDept').value    = data.department || '';
      document.getElementById('pSubject').value = data.subject || '';
    }

    document.getElementById('removePicBtn').style.display = currentPicture ? 'inline-flex' : 'none';
    document.getElementById('picInput').value = '';
    document.getElementById('profileErr').classList.add('hidden');
    document.getElementById('otpErr').classList.add('hidden');

    localStorage.setItem('profile_picture', currentPicture || '');
    const av = document.getElementById('userAvatar');
    if (av) {
      if (currentPicture) {
        av.style.backgroundImage = `url(${currentPicture})`;
        av.style.backgroundSize  = 'cover';
        av.style.backgroundPosition = 'center';
        av.textContent = '';
      } else {
        av.style.backgroundImage = '';
        av.textContent = (data.full_name || '?').charAt(0).toUpperCase();
      }
    }
  }

  function resetProfileDraft(showToastMessage = false) {
    clearInterval(profileOtpTimer);
    document.getElementById('otpPanel').classList.add('hidden');
    document.getElementById('profileForm').classList.remove('hidden');
    document.querySelectorAll('#profileOtpInputs .otp-box').forEach(b => {
      b.value = '';
      b.classList.remove('otp-error');
    });
    document.getElementById('profileOtpCountdown').textContent = '03:00';
    document.getElementById('profileResendBtn').disabled = true;
    document.getElementById('confirmOtpBtn').disabled = false;
    document.getElementById('confirmOtpBtn').innerHTML = 'Confirm';
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').textContent = 'Save Changes';
    pendingProfilePayload = null;

    if (profileData) applyProfileData(profileData);
    if (showToastMessage) showToast('Changes discarded', 'info');
  }

  function renderAvatar(name, pic) {
    const img  = document.getElementById('profileImg');
    const init = document.getElementById('profileInitial');
    if (pic) {
      img.src = pic;
      img.classList.remove('hidden');
      init.classList.add('hidden');
    } else {
      img.classList.add('hidden');
      init.classList.remove('hidden');
      init.textContent = (name || '?').charAt(0).toUpperCase();
    }
  }

  function handlePicture(input) {
    const file = input.files[0];
    if (!file) return;
    const allowedTypes = ['image/jpeg', 'image/png'];
    const hasValidType = allowedTypes.includes(file.type);
    const hasValidExtension = /\.(jpe?g|png)$/i.test(file.name || '');

    if (!hasValidType || !hasValidExtension) {
      input.value = '';
      showToast('Only .jpg, .jpeg, and .png files are allowed', 'error');
      return;
    }

    if (file.size > 5 * 1024 * 1024) {
      input.value = '';
      showToast('Image must be 5MB or smaller', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      currentPicture = e.target.result; // base64 data URL
      renderAvatar(getProfileFullNameFromFields() || profileData?.full_name, currentPicture);
      document.getElementById('removePicBtn').style.display = 'inline-flex';
      showToast('Photo selected — click Save to apply', 'info');
    };
    reader.readAsDataURL(file);
  }

  async function removePicture() {
    const confirmed = await showConfirmModal({
      title: 'Remove Photo',
      message: 'Do you want to remove your profile photo?',
      confirmText: 'Yes',
      cancelText: 'No'
    });
    if (!confirmed) return;
    currentPicture = null;
    document.getElementById('picInput').value = '';
    renderAvatar(getProfileFullNameFromFields() || profileData?.full_name, null);
    document.getElementById('removePicBtn').style.display = 'none';
    showToast('Photo removed — click Save to apply', 'info');
  }

  async function requestDiscardProfileChanges() {
    const confirmed = await showConfirmModal({
      title: 'Discard Changes',
      message: 'Do you want to discard your unsaved profile changes?',
      confirmText: 'Yes',
      cancelText: 'No'
    });
    if (!confirmed) return;
    if (profileData) {
      resetProfileDraft(true);
    } else {
      await loadProfile();
    }
  }

  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('profileErr').classList.add('hidden');

    const email = normalizeEmailValue(document.getElementById('pEmail').value);
    if (!email) {
      const err = document.getElementById('profileErr');
      err.textContent = 'Email is required for verification';
      err.classList.remove('hidden');
      return;
    }
    const emailError = getEmailError(email);
    if (emailError) {
      const err = document.getElementById('profileErr');
      err.textContent = emailError;
      err.classList.remove('hidden');
      return;
    }
    const birthDate = document.getElementById('pBirthDate').value;
    const birthDateError = getProfileBirthDateError(birthDate);
    if (birthDateError) {
      const err = document.getElementById('profileErr');
      err.textContent = birthDateError;
      err.classList.remove('hidden');
      return;
    }
    const nameParts = getProfileNameParts();
    const fullName = buildProfileFullNameFromParts(nameParts);
    if (!nameParts.first_name || !nameParts.last_name) {
      const err = document.getElementById('profileErr');
      err.textContent = 'First name and last name are required';
      err.classList.remove('hidden');
      return;
    }
    const municipality = getSelectedProfileMunicipalityLabel();
    if (!municipality) {
      const err = document.getElementById('profileErr');
      err.textContent = 'Please select a municipality or city';
      err.classList.remove('hidden');
      return;
    }
    const barangay = document.getElementById('pBarangay').value;
    if (!barangay) {
      const err = document.getElementById('profileErr');
      err.textContent = 'Please select a barangay';
      err.classList.remove('hidden');
      return;
    }
    const confirmed = await requestSaveConfirmation({
      title: 'Save Profile',
      message: 'Do you want to save these profile changes?'
    });
    if (!confirmed) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Sending code...';

    pendingProfilePayload = {
      first_name: nameParts.first_name,
      middle_name: nameParts.middle_name,
      last_name: nameParts.last_name,
      suffix: nameParts.suffix,
      full_name: fullName,
      email,
      phone:     document.getElementById('pPhone').value.trim(),
      date_of_birth: birthDate,
      province: document.getElementById('pProvince').value.trim(),
      municipality,
      barangay,
      profile_picture: currentPicture || ''
    };
    if (role === 'staff') {
      pendingProfilePayload.course     = document.getElementById('pCourse').value.trim();
      pendingProfilePayload.year_level = document.getElementById('pYear').value;
      pendingProfilePayload.section    = document.getElementById('pSection').value.trim();
    }
    if (role === 'supervisor') {
      pendingProfilePayload.department = document.getElementById('pDept').value.trim();
      pendingProfilePayload.subject    = document.getElementById('pSubject').value.trim();
    }

    const res = await API.post('/api/send-otp', { email, purpose: 'profile_update' });
    btn.disabled = false;
    btn.textContent = 'Save Changes';

    if (res.message) {
      document.getElementById('profileForm').classList.add('hidden');
      document.getElementById('otpPanel').classList.remove('hidden');
      startProfileOtpTimer();
      document.querySelector('#profileOtpInputs .otp-box').focus();
    } else {
      const err = document.getElementById('profileErr');
      err.textContent = res.error || 'Failed to send OTP';
      err.classList.remove('hidden');
    }
  });

  let pendingProfilePayload = null;
  let profileOtpTimer = null;

  document.querySelectorAll('#profileOtpInputs .otp-box').forEach((box, i, boxes) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/,'');
      if (box.value && i < boxes.length - 1) boxes[i+1].focus();
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
    });
  });

  function getProfileOtp() {
    return [...document.querySelectorAll('#profileOtpInputs .otp-box')].map(b => b.value).join('');
  }

  function startProfileOtpTimer() {
    clearInterval(profileOtpTimer);
    let secs = 180;
    const el = document.getElementById('profileOtpCountdown');
    const resend = document.getElementById('profileResendBtn');
    resend.disabled = true;
    profileOtpTimer = setInterval(() => {
      secs--;
      el.textContent = String(Math.floor(secs/60)).padStart(2,'0') + ':' + String(secs%60).padStart(2,'0');
      if (secs <= 0) { clearInterval(profileOtpTimer); el.textContent = 'Expired'; resend.disabled = false; }
      if (secs === 120) resend.disabled = false;
    }, 1000);
  }

  async function resendProfileOtp() {
    const email = pendingProfilePayload && pendingProfilePayload.email;
    if (!email) { showToast('No email on file', 'error'); return; }
    document.getElementById('profileResendBtn').disabled = true;
    const res = await API.post('/api/send-otp', { email, purpose: 'profile_update' });
    if (res.message) { showToast('Code resent!', 'success'); startProfileOtpTimer(); }
    else showToast(res.error || 'Failed to resend', 'error');
  }

  function cancelOtp() {
    resetProfileDraft(false);
  }

  async function confirmProfileOtp() {
    document.getElementById('otpErr').classList.add('hidden');
    const otp = getProfileOtp();
    if (otp.length < 6) {
      const el = document.getElementById('otpErr');
      el.textContent = 'Enter the 6-digit code'; el.classList.remove('hidden'); return;
    }
    const btn = document.getElementById('confirmOtpBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const verRes = await API.post('/api/verify-otp', { email: pendingProfilePayload.email, otp, purpose: 'profile_update' });
    if (!verRes.verified) {
      document.querySelectorAll('#profileOtpInputs .otp-box').forEach(b => b.classList.add('otp-error'));
      setTimeout(() => document.querySelectorAll('#profileOtpInputs .otp-box').forEach(b => b.classList.remove('otp-error')), 500);
      const el = document.getElementById('otpErr');
      el.textContent = verRes.error || 'Invalid or expired code'; el.classList.remove('hidden');
      btn.disabled = false; btn.innerHTML = 'Confirm'; return;
    }

    const submittedPayload = { ...pendingProfilePayload };
    const res = await API.put('/api/profile', submittedPayload);
    btn.disabled = false; btn.innerHTML = 'Confirm';
    if (res.message) {
      clearInterval(profileOtpTimer);
      cancelOtp();
      localStorage.setItem('name', submittedPayload.full_name);
      localStorage.setItem('profile_picture', currentPicture || '');
      document.getElementById('userName').textContent = submittedPayload.full_name;
      showToast('Profile updated!', 'success');
      loadProfile();
    } else {
      const el = document.getElementById('otpErr');
      el.textContent = res.error || 'Update failed'; el.classList.remove('hidden');
    }
  }

  document.getElementById('passwordForm').addEventListener('submit', async e => {
    e.preventDefault();
    const current = document.getElementById('currentPass').value;
    const newP    = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    const err     = document.getElementById('passErr');
    err.classList.add('hidden');

    if (newP.length < 6) { showPassErr('Password must be at least 6 characters'); return; }
    if (newP !== confirm) { showPassErr('Passwords do not match'); return; }
    const confirmedAction = await requestSaveConfirmation({
      title: 'Update Password',
      message: 'Do you want to update your password?'
    });
    if (!confirmedAction) return;

    const res = await API.post('/api/change-password', {
      current_password: current,
      new_password: newP
    });

    if (res.message) {
      showToast('Password updated!', 'success');
      document.getElementById('passwordForm').reset();
      document.getElementById('strengthFill').style.width = '0';
      document.getElementById('strengthLabel').textContent = '';
    } else {
      showPassErr(res.error || 'Update failed');
    }
  });

  function showPassErr(msg) {
    const el = document.getElementById('passErr');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function switchProfileTab(name, btn) {
    document.getElementById('tab-info').classList.toggle('hidden', name !== 'info');
    document.getElementById('tab-security').classList.toggle('hidden', name !== 'security');
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    const showPassword = inp.type === 'password';
    inp.type = showPassword ? 'text' : 'password';
    btn.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
    btn.setAttribute('aria-pressed', showPassword ? 'true' : 'false');
    btn.querySelector('.toggle-pass-eye')?.classList.toggle('hidden', showPassword);
    btn.querySelector('.toggle-pass-eye-off')?.classList.toggle('hidden', !showPassword);
  }

  document.getElementById('newPass').addEventListener('input', function () {
    const v = this.value;
    let score = 0;
    if (v.length >= 6)          score++;
    if (v.length >= 10)         score++;
    if (/[A-Z]/.test(v))        score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#a74d3d','#d7a64f','#d7a64f','#A78D78','#6E473B'];
    const labels = ['Too short','Weak','Fair','Strong','Very strong'];
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    fill.style.width      = (score * 20) + '%';
    fill.style.background = v.length ? colors[Math.max(0, score - 1)] : '';
    label.textContent     = v.length ? labels[Math.max(0, score - 1)] : '';
  });
</script>
</body>
</html>
