<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff - Latte & Letters</title>
<link rel="stylesheet" href="css/style.css?v=latte-workforce">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo-icon"></div><span class="logo-text">Latte & Letters</span></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div><div class="user-name" id="userName">Loading...</div><div class="user-role" id="userRole">-</div></div>
      </div>
      
    </div>
  </aside>
  <main class="main-content">
    <header class="top-bar">
      <button type="button" class="btn-icon" onclick="toggleSidebar()">&#9776; Menu</button>
      <h2 class="page-title" id="studentsPageTitle">Manage Staff</h2>
      <div class="top-bar-right">
        <input type="text" id="searchInput" placeholder="Search staff..." class="search-input" oninput="filterTable()">
        <select id="courseFilter" class="search-input" onchange="filterTable()"><option value="">All Work Areas</option></select>
        <select id="yearFilter" class="search-input" onchange="filterTable()"><option value="">All Levels</option></select>
        <button type="button" class="btn btn-secondary" id="studentsArchiveToggleBtn" onclick="toggleArchiveView()">View Archived</button>
        <button type="button" class="btn btn-primary hidden" id="addMembersBtn" onclick="openModal()">+ Add Members</button>
      </div>
    </header>
    <div class="content-area">
      <div class="table-card">
        <table class="data-table" id="studentsTable">
          <thead>
            <tr><th>Staff ID</th><th>Full Name</th><th>Work Area</th><th>Level</th><th>Shift Group</th><th>Email</th><th>Actions</th></tr>
          </thead>
          <tbody id="studentsBody"><tr><td colspan="7" class="loading-row">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal student-profile-modal">
    <div class="modal-header">
      <h3 id="modalTitle">Edit Staff</h3>
      <button type="button" class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <form id="studentForm">
      <input type="hidden" id="studentId">
      <div class="form-row" id="accountUsernameRow">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="fUsername" autocomplete="off" placeholder="e.g. jdelacruz" required>
        </div>
      </div>
      <div class="form-row" id="accountPasswordRow">
        <div class="form-group">
          <label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="fPassword" autocomplete="new-password" required>
            <button type="button" class="toggle-pass" onclick="togglePass('fPassword', this)" aria-label="Show password">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pass-wrap">
            <input type="password" id="fConfirmPassword" autocomplete="new-password" required>
            <button type="button" class="toggle-pass" onclick="togglePass('fConfirmPassword', this)" aria-label="Show password">👁</button>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="fFirstName" required></div>
        <div class="form-group"><label>Middle Name (Optional)</label><input type="text" id="fMiddleName"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Last Name</label><input type="text" id="fLastName" required></div>
        <div class="form-group"><label>Suffix</label><input type="text" id="fSuffix" placeholder="Jr., Sr., III"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="fEmail" required></div>
        <div class="form-group"><label>Contact No.</label><input type="text" id="fPhone"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date of Birth</label><input type="date" id="fBirthDate" required></div>
        <div class="form-group"><label>Age</label><input type="text" id="fAge" placeholder="Auto computed" readonly></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Province</label><input type="text" id="fProvince" value="LAGUNA" readonly required></div>
        <div class="form-group">
          <label>Municipality / City</label>
          <select id="fMunicipality" required><option value="">Select municipality or city</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Barangay</label>
          <select id="fBarangay" required disabled><option value="">Select barangay</option></select>
        </div>
      </div>
      <div class="form-row" id="staffIdentityRow">
        <div class="form-group"><label>Staff ID</label><input type="text" id="fStudentId" placeholder="Select level" readonly required></div>
        <div class="form-group">
          <label>Staff Level</label>
          <select id="fYear" required>
            <option value="">Select level</option>
            <option value="1">Level 1 - Trainee</option>
            <option value="2">Level 2 - Regular</option>
            <option value="3">Level 3 - Senior</option>
            <option value="4">Level 4 - Lead</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Branch / Department</label>
          <select id="fCollege" required><option value="">Select branch / department</option></select>
        </div>
        <div class="form-group">
          <label>Work Area</label>
          <select id="fProgram" required disabled><option value="">Select branch first</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Position</label>
          <select id="fSpecialization" disabled><option value="">Select work area first</option></select>
        </div>
        <div class="form-group" id="shiftGroupField">
          <label>Shift Group</label>
          <select id="fSection" required>
            <option value="">Select shift group</option>
            <option value="Opening (6am - 2pm)">Opening (6am - 2pm)</option>
            <option value="Mid Shift (10am - 6pm)">Mid Shift (10am - 6pm)</option>
            <option value="Closing (2pm - 10pm)">Closing (2pm - 10pm)</option>
          </select>
        </div>
      </div>
      <div id="memberOtpPanel" class="profile-otp-panel hidden">
        <p class="profile-otp-copy">A verification code has been sent to <strong id="memberOtpEmail"></strong>. Enter it to create this staff account.</p>
        <div class="otp-inputs" id="memberOtpInputs">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>
        <div class="otp-timer profile-otp-timer">Expires in <span id="memberOtpCountdown">03:00</span></div>
        <div id="memberOtpErr" class="error-msg profile-otp-error hidden"></div>
        <div class="profile-otp-actions">
          <button type="button" class="btn btn-secondary" id="memberResendOtpBtn" onclick="resendMemberOtp()">Resend Code</button>
          <button type="button" class="btn btn-primary" id="memberVerifyOtpBtn" onclick="verifyMemberOtpAndCreate()">Verify & Create Account</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="js/laguna-addresses.js"></script>
<script src="js/app.js"></script>
<script>
  requireRole('admin', 'supervisor');
  renderNav();
  let showArchived = false;
  let studentsData = [];
  let pendingMemberPayload = null;
  let memberOtpTimer = null;
  const CURRENT_ROLE = localStorage.getItem('role') || '';
  const lagunaLocationData = window.LAGUNA_LOCATION_DATA || { province: 'LAGUNA', municipalities: [] };
  initializeStudentLocationFields();
  initializeAcademicSelectors({ collegeId: 'fCollege', programId: 'fProgram', specializationId: 'fSpecialization' });
  setStudentBirthDateBounds();
  updateStudentsViewState();
  loadStudents();

  async function loadStudents() {
    const data = await API.get('/api/students' + (showArchived ? '?archived=1' : ''));
    studentsData = data || [];
    populateStudentFilters(studentsData);
    filterTable();
  }

  function renderStudents(data) {
    const tbody = document.getElementById('studentsBody');
    if (!data || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-row">${showArchived ? 'No archived staff found' : 'No staff found'}</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(s => `
      <tr>
        <td>${s.student_id}</td>
        <td>${s.full_name}</td>
        <td>${s.course || '-'}</td>
        <td>${s.year_level || '-'}</td>
        <td>${s.section || '-'}</td>
        <td>${s.email || '-'}</td>
        <td class="actions">
          ${showArchived
            ? `<button type="button" class="btn btn-sm btn-success" onclick="restoreStudent(${s.id})">Restore</button>
               <button type="button" class="btn btn-sm btn-danger" onclick="permanentlyDeleteStudent(${s.id})">Permanent Delete</button>`
            : `<button type="button" class="btn btn-sm btn-secondary" onclick="editStudent('${encodeURIComponent(JSON.stringify(s))}')">Edit</button>
               <button type="button" class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id})">Archive</button>
               <button type="button" class="btn btn-sm btn-teal" onclick="showQR(${s.id})">QR</button>`}
        </td>
      </tr>`).join('');
  }

  function populateStudentFilters(data) {
    const courseFilter = document.getElementById('courseFilter');
    const yearFilter = document.getElementById('yearFilter');
    const currentCourse = courseFilter.value;
    const currentYear = yearFilter.value;
    const courses = [...new Set(data.map(s => s.course || '').filter(Boolean))].sort();
    const years = [...new Set(data.map(s => String(s.year_level || '')).filter(Boolean))].sort((a, b) => Number(a) - Number(b));
    courseFilter.innerHTML = '<option value="">All Work Areas</option>' + courses.map(course => `<option value="${course}">${course}</option>`).join('');
    yearFilter.innerHTML = '<option value="">All Levels</option>' + years.map(year => `<option value="${year}">Level ${year}</option>`).join('');
    courseFilter.value = courses.includes(currentCourse) ? currentCourse : '';
    yearFilter.value = years.includes(currentYear) ? currentYear : '';
  }

  function updateStudentsViewState() {
    document.getElementById('studentsPageTitle').textContent = showArchived ? 'Archived Staff' : 'Manage Staff';
    document.getElementById('studentsArchiveToggleBtn').textContent = showArchived ? 'Back to Active' : 'View Archived';
    document.getElementById('addMembersBtn')?.classList.toggle('hidden', showArchived || CURRENT_ROLE !== 'admin');
  }

  function toggleArchiveView() {
    showArchived = !showArchived;
    updateStudentsViewState();
    loadStudents();
  }

  function studentIdPrefix(yearLevel) {
    switch (String(yearLevel || '')) {
      case '4': return '221-';
      case '3': return '231-';
      case '2': return '241-';
      case '1': return '251-';
      default: return '';
    }
  }

  function updateStudentIdPreview() {
    const isEdit = !!document.getElementById('studentId').value;
    if (isEdit) return;
    const prefix = studentIdPrefix(document.getElementById('fYear').value);
    document.getElementById('fStudentId').value = prefix ? `${prefix}XXXX` : '';
  }

  function getLagunaMunicipalities() {
    return Array.isArray(lagunaLocationData.municipalities) ? lagunaLocationData.municipalities : [];
  }

  function repairLocationEncoding(value) {
    const text = String(value || '').trim();
    if (!text || !/[ÃƒÃ‚Ã¢]/.test(text)) return text;
    try {
      const percentEncoded = Array.from(text)
        .map(ch => '%' + ch.charCodeAt(0).toString(16).padStart(2, '0'))
        .join('');
      return decodeURIComponent(percentEncoded);
    } catch (error) {
      return text
        .replace(/ÃƒÂ±/g, 'ñ')
        .replace(/Ãƒâ€˜|ÃƒÂ‘/g, 'Ñ')
        .replace(/ÃƒÂ¡/g, 'á')
        .replace(/ÃƒÂ©/g, 'é')
        .replace(/ÃƒÂ­/g, 'í')
        .replace(/ÃƒÂ³/g, 'ó')
        .replace(/ÃƒÂº/g, 'ú');
    }
  }

  function formatLocationLabel(value) {
    let label = repairLocationEncoding(value);
    if (!label) return '';
    label = label.replace(/\s+\(Capital\)$/i, '');
    if (/^CITY OF /i.test(label)) label = label.replace(/^CITY OF /i, '') + ' CITY';
    return label
      .toLowerCase()
      .replace(/\b([a-z\u00c0-\u00ff])/g, match => match.toUpperCase())
      .replace(/\bOf\b/g, 'of')
      .replace(/\bAnd\b/g, 'and');
  }

  function formatBarangayLabel(value) {
    return repairLocationEncoding(value).replace(/\s+/g, ' ').trim();
  }

  function populateStudentProvince() {
    document.getElementById('fProvince').value = lagunaLocationData.province || 'LAGUNA';
  }

  function populateStudentMunicipalities(selectedCode = '', selectedName = '') {
    const municipality = document.getElementById('fMunicipality');
    municipality.innerHTML = '<option value="">Select municipality or city</option>';
    const selectedLabel = formatLocationLabel(selectedName);
    let matchedCode = '';

    getLagunaMunicipalities().forEach(item => {
      const label = formatLocationLabel(item.name);
      const option = document.createElement('option');
      option.value = item.code;
      option.textContent = label;
      municipality.appendChild(option);
      if (!matchedCode && selectedLabel && label === selectedLabel) matchedCode = item.code;
    });

    municipality.value = selectedCode || matchedCode || '';
  }

  function getSelectedStudentMunicipalityData() {
    const code = document.getElementById('fMunicipality').value;
    return getLagunaMunicipalities().find(item => item.code === code) || null;
  }

  function getSelectedStudentMunicipalityLabel() {
    const item = getSelectedStudentMunicipalityData();
    return item ? formatLocationLabel(item.name) : '';
  }

  function populateStudentBarangays(municipalityCode = '', selectedBarangay = '') {
    const barangay = document.getElementById('fBarangay');
    const municipality = getLagunaMunicipalities().find(item => item.code === municipalityCode);
    barangay.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = municipality ? 'Select barangay' : 'Select municipality or city first';
    barangay.appendChild(placeholder);

    if (!municipality) {
      barangay.disabled = true;
      barangay.value = '';
      return;
    }

    municipality.barangays.forEach(name => {
      const label = formatBarangayLabel(name);
      const option = document.createElement('option');
      option.value = label;
      option.textContent = label;
      barangay.appendChild(option);
    });

    barangay.disabled = false;
    barangay.value = formatBarangayLabel(selectedBarangay || '');
  }

  function initializeStudentLocationFields() {
    populateStudentProvince();
    populateStudentMunicipalities();
    populateStudentBarangays('');
    document.getElementById('fMunicipality').addEventListener('change', (event) => {
      populateStudentBarangays(event.target.value);
    });
  }

  function setStudentBirthDateBounds() {
    const field = document.getElementById('fBirthDate');
    const today = new Date();
    const max = new Date(today.getFullYear() - 15, today.getMonth(), today.getDate());
    const min = new Date(today.getFullYear() - 80, today.getMonth(), today.getDate());
    const toLocalDate = date => [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, '0'),
      String(date.getDate()).padStart(2, '0')
    ].join('-');
    field.max = toLocalDate(max);
    field.min = toLocalDate(min);
  }

  function getStudentBirthDateError(value) {
    if (!value) return 'Date of birth is required';
    const birthDate = new Date(`${value}T00:00:00`);
    if (Number.isNaN(birthDate.getTime())) return 'Enter a valid date of birth';
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
    if (age < 15 || age > 80) return 'Age must be between 15 and 80 years old';
    return null;
  }

  function getStudentAgeFromBirthDate(value) {
    if (!value) return null;
    const birthDate = new Date(`${value}T00:00:00`);
    if (Number.isNaN(birthDate.getTime())) return null;
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
    return age;
  }

  function updateStudentAgeField() {
    const ageInput = document.getElementById('fAge');
    const birthDateInput = document.getElementById('fBirthDate');
    if (!ageInput || !birthDateInput) return;
    const age = getStudentAgeFromBirthDate(birthDateInput.value);
    ageInput.value = Number.isInteger(age) && age >= 0 ? String(age) : '';
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    if (!input) return;
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  }

  function bindMemberOtpInputs() {
    document.querySelectorAll('#memberOtpInputs .otp-box').forEach((box, index, boxes) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(0, 1);
        if (box.value && index < boxes.length - 1) boxes[index + 1].focus();
      });
      box.addEventListener('keydown', event => {
        if (event.key === 'Backspace' && !box.value && index > 0) boxes[index - 1].focus();
      });
    });
  }

  function getMemberOtpValue() {
    return [...document.querySelectorAll('#memberOtpInputs .otp-box')].map(box => box.value).join('');
  }

  function resetMemberOtpPanel() {
    clearInterval(memberOtpTimer);
    document.getElementById('memberOtpPanel').classList.add('hidden');
    document.getElementById('memberOtpErr').classList.add('hidden');
    document.querySelectorAll('#memberOtpInputs .otp-box').forEach(box => {
      box.value = '';
      box.classList.remove('otp-error');
    });
    document.getElementById('memberOtpCountdown').textContent = '03:00';
    document.getElementById('memberResendOtpBtn').disabled = false;
    document.getElementById('memberVerifyOtpBtn').disabled = false;
  }

  function startMemberOtpTimer() {
    clearInterval(memberOtpTimer);
    let seconds = 180;
    const countdown = document.getElementById('memberOtpCountdown');
    const resend = document.getElementById('memberResendOtpBtn');
    resend.disabled = true;
    countdown.textContent = '03:00';
    memberOtpTimer = setInterval(() => {
      seconds--;
      countdown.textContent = String(Math.floor(seconds / 60)).padStart(2, '0') + ':' + String(seconds % 60).padStart(2, '0');
      if (seconds <= 0) {
        clearInterval(memberOtpTimer);
        countdown.textContent = 'Expired';
        resend.disabled = false;
      }
    }, 1000);
  }

  function showMemberOtpError(message) {
    const error = document.getElementById('memberOtpErr');
    error.textContent = message;
    error.classList.remove('hidden');
  }

  async function sendMemberOtp(payload) {
    pendingMemberPayload = payload;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Sending Code...';
    const res = await API.post('/api/send-otp', { email: payload.email, purpose: 'register' });
    saveBtn.disabled = false;
    saveBtn.textContent = 'Send Verification Code';
    if (res.message) {
      document.getElementById('memberOtpEmail').textContent = payload.email;
      document.getElementById('memberOtpPanel').classList.remove('hidden');
      document.getElementById('memberOtpErr').classList.add('hidden');
      document.querySelectorAll('#memberOtpInputs .otp-box').forEach(box => box.value = '');
      startMemberOtpTimer();
      document.querySelector('#memberOtpInputs .otp-box')?.focus();
    } else {
      showToast(res.error || 'Failed to send verification code', 'error');
    }
  }

  async function resendMemberOtp() {
    if (!pendingMemberPayload) return;
    document.getElementById('memberOtpErr').classList.add('hidden');
    const res = await API.post('/api/send-otp', { email: pendingMemberPayload.email, purpose: 'register' });
    if (res.message) {
      showToast('Code resent', 'success');
      startMemberOtpTimer();
    } else {
      showMemberOtpError(res.error || 'Failed to resend code');
    }
  }

  async function verifyMemberOtpAndCreate() {
    if (!pendingMemberPayload) return;
    document.getElementById('memberOtpErr').classList.add('hidden');
    const otp = getMemberOtpValue();
    if (otp.length < 6) { showMemberOtpError('Enter the 6-digit code'); return; }
    const btn = document.getElementById('memberVerifyOtpBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying...';
    const verRes = await API.post('/api/verify-otp', { email: pendingMemberPayload.email, otp, purpose: 'register' });
    if (!verRes.verified) {
      document.querySelectorAll('#memberOtpInputs .otp-box').forEach(box => box.classList.add('otp-error'));
      setTimeout(() => document.querySelectorAll('#memberOtpInputs .otp-box').forEach(box => box.classList.remove('otp-error')), 500);
      showMemberOtpError(verRes.error || 'Invalid or expired code');
      btn.disabled = false;
      btn.textContent = 'Verify & Create Account';
      return;
    }
    btn.textContent = 'Creating...';
    const res = await API.post('/api/students', pendingMemberPayload);
    btn.disabled = false;
    btn.textContent = 'Verify & Create Account';
    if (res.message) {
      clearInterval(memberOtpTimer);
      const createdId = res.student_id ? `: ${res.student_id}` : '';
      pendingMemberPayload = null;
      resetMemberOtpPanel();
      closeModal();
      loadStudents();
      showToast(`${res.message}${createdId}`, 'success');
    } else {
      showMemberOtpError(res.error || 'Account creation failed');
    }
  }

  function getSelectedMemberRole() {
    return 'staff';
  }

  function updateMemberRoleFields() {
    const role = getSelectedMemberRole();
    const isSupervisor = role === 'supervisor';
    const isEdit = !!document.getElementById('studentId').value;
    document.getElementById('accountUsernameRow').classList.toggle('hidden', isEdit);
    document.getElementById('accountPasswordRow').classList.toggle('hidden', isEdit);
    document.getElementById('staffIdentityRow').classList.toggle('hidden', isSupervisor);
    document.getElementById('shiftGroupField').classList.toggle('hidden', isSupervisor);
    document.querySelector('label[for="fProgram"]')?.removeAttribute('for');
    const programLabel = document.querySelector('#fProgram')?.closest('.form-group')?.querySelector('label');
    if (programLabel) programLabel.textContent = isSupervisor ? 'Assigned Area' : 'Work Area';
    const studentIdField = document.getElementById('fStudentId');
    const yearField = document.getElementById('fYear');
    const sectionField = document.getElementById('fSection');
    studentIdField.required = !isSupervisor;
    yearField.required = !isSupervisor;
    sectionField.required = !isSupervisor;
    document.getElementById('fUsername').required = !isEdit;
    document.getElementById('fUsername').disabled = isEdit;
    document.getElementById('fPassword').required = !isEdit;
    document.getElementById('fConfirmPassword').required = !isEdit;
    if (isSupervisor) {
      studentIdField.value = '';
      yearField.value = '';
      sectionField.value = '';
    } else if (!isEdit) {
      updateStudentIdPreview();
    }
  }

  const STUDENT_SUFFIXES = ['JR', 'SR', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];

  function normalizeStudentSuffix(value) {
    const cleaned = String(value || '').trim().replace(/\./g, '');
    if (!cleaned) return '';
    const upper = cleaned.toUpperCase();
    if (upper === 'JR') return 'Jr.';
    if (upper === 'SR') return 'Sr.';
    return STUDENT_SUFFIXES.includes(upper) ? upper : toNameCase(cleaned);
  }

  function splitStudentFullName(fullName) {
    const tokens = String(fullName || '').trim().split(/\s+/).filter(Boolean);
    if (!tokens.length) return { firstName: '', middleName: '', lastName: '', suffix: '' };

    let suffix = '';
    const possibleSuffix = tokens[tokens.length - 1].replace(/\./g, '').toUpperCase();
    if (STUDENT_SUFFIXES.includes(possibleSuffix)) suffix = tokens.pop();

    const lastName = tokens.length ? tokens.pop() : '';
    const firstName = tokens.length ? tokens.shift() : '';
    const middleName = tokens.join(' ');
    return { firstName, middleName, lastName, suffix: normalizeStudentSuffix(suffix) };
  }

  function buildStudentFullName() {
    const firstName = toNameCase(document.getElementById('fFirstName').value);
    const middleName = toNameCase(document.getElementById('fMiddleName').value);
    const lastName = toNameCase(document.getElementById('fLastName').value);
    const suffix = normalizeStudentSuffix(document.getElementById('fSuffix').value);
    return [firstName, middleName, lastName, suffix].filter(Boolean).join(' ').trim();
  }

  function openModal(data = null) {
    document.getElementById('studentForm').reset();
    pendingMemberPayload = null;
    resetMemberOtpPanel();
    document.getElementById('modalTitle').textContent = data ? 'Edit Staff' : 'Add Members';
    document.getElementById('saveBtn').textContent = data ? 'Save' : 'Send Verification Code';
    const fallbackNameParts = splitStudentFullName(data ? data.full_name : '');
    const nameParts = data
      ? {
          firstName: data.first_name || fallbackNameParts.firstName,
          middleName: data.middle_name || fallbackNameParts.middleName,
          lastName: data.last_name || fallbackNameParts.lastName,
          suffix: data.suffix || fallbackNameParts.suffix
        }
      : { firstName: '', middleName: '', lastName: '', suffix: '' };
    populateStudentProvince();
    populateStudentMunicipalities('', data ? data.municipality || '' : '');
    populateStudentBarangays(document.getElementById('fMunicipality').value, data ? data.barangay || '' : '');
    document.getElementById('studentId').value   = data ? data.id : '';
    document.getElementById('fUsername').value   = '';
    document.getElementById('fPassword').value   = '';
    document.getElementById('fConfirmPassword').value = '';
    document.getElementById('fStudentId').value  = data ? data.student_id : '';
    document.getElementById('fFirstName').value  = nameParts.firstName;
    document.getElementById('fMiddleName').value = nameParts.middleName;
    document.getElementById('fLastName').value   = nameParts.lastName;
    document.getElementById('fSuffix').value     = normalizeStudentSuffix(nameParts.suffix);
    document.getElementById('fEmail').value      = data ? data.email || '' : '';
    document.getElementById('fPhone').value      = data ? data.phone || '' : '';
    document.getElementById('fBirthDate').value  = data ? data.date_of_birth || '' : '';
    updateStudentAgeField();
    document.getElementById('fProvince').value   = data ? (data.province || 'LAGUNA').toUpperCase() : 'LAGUNA';
    populateAcademicCollegeSelect(document.getElementById('fCollege'), data ? data.college || '' : '');
    populateAcademicProgramSelect(document.getElementById('fProgram'), document.getElementById('fCollege').value, data ? data.course || '' : '');
    populateAcademicSpecializationSelect(document.getElementById('fSpecialization'), document.getElementById('fCollege').value, document.getElementById('fProgram').value, data ? data.specialization || '' : '');
    document.getElementById('fYear').value       = data ? data.year_level || '' : '';
    document.getElementById('fSection').value    = data ? data.section || '' : '';
    document.getElementById('fStudentId').readOnly = true;
    updateMemberRoleFields();
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function editStudent(encoded) { openModal(JSON.parse(decodeURIComponent(encoded))); }
  function closeModal() {
    pendingMemberPayload = null;
    resetMemberOtpPanel();
    document.getElementById('modalOverlay').classList.add('hidden');
  }
  bindAutoNameCase(['fFirstName', 'fMiddleName', 'fLastName']);
  document.getElementById('fSuffix')?.addEventListener('input', event => {
    event.target.value = normalizeStudentSuffix(event.target.value);
  });
  document.getElementById('fBirthDate')?.addEventListener('input', updateStudentAgeField);
  document.getElementById('fBirthDate')?.addEventListener('change', updateStudentAgeField);
  document.getElementById('fYear').addEventListener('change', updateStudentIdPreview);
  bindMemberOtpInputs();

  document.getElementById('studentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('studentId').value;
    const memberRole = getSelectedMemberRole();
    const isSupervisor = memberRole === 'supervisor';
    const email = normalizeEmailValue(document.getElementById('fEmail').value);
    const emailError = getEmailError(email);
    if (emailError) { showToast(emailError, 'error'); return; }
    if (!document.getElementById('fFirstName').value.trim() || !document.getElementById('fLastName').value.trim()) {
      showToast('First name and last name are required', 'error');
      return;
    }
    const birthDate = document.getElementById('fBirthDate').value;
    const birthDateError = getStudentBirthDateError(birthDate);
    if (birthDateError) { showToast(birthDateError, 'error'); return; }
    const municipality = getSelectedStudentMunicipalityLabel();
    const barangay = document.getElementById('fBarangay').value;
    const specializationInput = document.getElementById('fSpecialization');
    if (!municipality) { showToast('Please select a municipality or city', 'error'); return; }
    if (!barangay) { showToast('Please select a barangay', 'error'); return; }
    if (!specializationInput.disabled && !specializationInput.value) {
      showToast('Please select a position', 'error');
      return;
    }
    if (!document.getElementById('fCollege').value) { showToast('Please select a branch / department', 'error'); return; }
    if (!document.getElementById('fProgram').value) { showToast(isSupervisor ? 'Please select an assigned area' : 'Please select a work area', 'error'); return; }
    if (!isSupervisor && (!document.getElementById('fYear').value || !document.getElementById('fSection').value)) {
      showToast('Please select staff level and shift group', 'error');
      return;
    }
    if (!id) {
      const username = document.getElementById('fUsername').value.trim();
      const password = document.getElementById('fPassword').value;
      const confirmPassword = document.getElementById('fConfirmPassword').value;
      if (!username) { showToast('Username is required', 'error'); return; }
      if (username.length < 3 || username.length > 30 || !/^[A-Za-z0-9_]+$/.test(username)) {
        showToast('Username must be 3-30 characters using letters, numbers, or underscores only', 'error');
        return;
      }
      if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      if (password !== confirmPassword) { showToast('Passwords do not match', 'error'); return; }
    }
    const payload = {
      id: id,
      username:  document.getElementById('fUsername').value.trim(),
      password:  document.getElementById('fPassword').value,
      student_id: document.getElementById('fStudentId').value,
      first_name: toNameCase(document.getElementById('fFirstName').value),
      middle_name: toNameCase(document.getElementById('fMiddleName').value),
      last_name: toNameCase(document.getElementById('fLastName').value),
      suffix: normalizeStudentSuffix(document.getElementById('fSuffix').value),
      full_name:  buildStudentFullName(),
      email:      email,
      phone:      document.getElementById('fPhone').value,
      date_of_birth: birthDate,
      province:   document.getElementById('fProvince').value,
      municipality: municipality,
      barangay:   barangay,
      college:    document.getElementById('fCollege').value,
      course:     document.getElementById('fProgram').value,
      specialization: specializationInput.disabled ? '' : specializationInput.value,
      year_level: document.getElementById('fYear').value,
      section:    document.getElementById('fSection').value
    };
    const studentIdLabel = !isSupervisor && String(payload.student_id || '').includes('XXXX')
      ? `Auto-generated (${payload.student_id})`
      : (payload.student_id || '-');
    if (isSupervisor) {
      payload.department = payload.college;
      payload.subject = payload.course;
      delete payload.student_id;
      delete payload.college;
      delete payload.course;
      delete payload.year_level;
      delete payload.section;
    }
    const confirmed = await requestSaveConfirmation({
      title: id ? 'Update Staff' : 'Add Member',
      message: id
        ? 'Do you want to update this staff member?'
        : isSupervisor
          ? `Please confirm adding this supervisor:\n\nName: ${payload.full_name || '-'}\nUsername: ${payload.username || '-'}\nBranch / Department: ${payload.department || '-'}\nAssigned Area: ${payload.subject || '-'}\nPosition: ${payload.specialization || '-'}\nDate of Birth: ${payload.date_of_birth || '-'}\nAge: ${document.getElementById('fAge').value || '-'}\nContact No.: ${payload.phone || '-'}\nEmail: ${payload.email || '-'}`
          : `Please confirm adding this staff member:\n\nName: ${payload.full_name || '-'}\nUsername: ${payload.username || '-'}\nStaff ID: ${studentIdLabel}\nBranch / Department: ${payload.college || '-'}\nWork Area: ${payload.course || '-'}\nPosition: ${payload.specialization || '-'}\nLevel / Shift Group: ${payload.year_level || '-'} / ${payload.section || '-'}\nDate of Birth: ${payload.date_of_birth || '-'}\nAge: ${document.getElementById('fAge').value || '-'}\nContact No.: ${payload.phone || '-'}\nEmail: ${payload.email || '-'}`,
      confirmText: 'Yes'
    });
    if (!confirmed) return;
    if (!id) {
      await sendMemberOtp(payload);
      return;
    }
    const res = id ? await API.put('/api/students', payload) : await API.post('/api/students', payload);
    if (res.message) {
      closeModal();
      loadStudents();
      showToast(res.student_id ? `${res.message}: ${res.student_id}` : res.message, 'success');
    }
    else showToast(res.error || 'Error', 'error');
  });

  async function deleteStudent(id) {
    const confirmed = await showConfirmModal({
      title: 'Archive Staff',
      message: 'This will move the staff member to Archived. You can restore it later. Continue?',
      confirmText: 'Archive',
      cancelText: 'No'
    });
    if (!confirmed) return;
    const res = await API.delete('/api/students?id=' + id);
    if (res.message) { loadStudents(); showToast('Staff archived', 'success'); }
  }

  async function restoreStudent(id) {
    const confirmed = await showConfirmModal({
      title: 'Restore Staff',
      message: 'Do you want to restore this staff member?',
      confirmText: 'Restore',
      cancelText: 'Cancel'
    });
    if (!confirmed) return;
    const res = await API.put('/api/students', { id, action: 'restore' });
    if (res.message) { loadStudents(); showToast(res.message, 'success'); }
    else showToast(res.error || 'Restore failed', 'error');
  }

  async function permanentlyDeleteStudent(id) {
    const confirmed = await showConfirmModal({
      title: 'Permanent Delete Staff',
      message: 'This will permanently delete the archived staff member and related attendance records. Continue?',
      confirmText: 'Delete',
      cancelText: 'Cancel'
    });
    if (!confirmed) return;
    const res = await API.delete('/api/students?id=' + id + '&permanent=1');
    if (res.message) { loadStudents(); showToast(res.message, 'success'); }
    else showToast(res.error || 'Permanent delete failed', 'error');
  }

  async function showQR(id) {
    const win = window.open('', '_blank', 'width=430,height=560');
    if (!win) {
      showToast('Allow popups to show the QR code', 'error');
      return;
    }
    win.document.write(`<!DOCTYPE html>
      <html>
      <head>
        <title>Staff QR</title>
        <style>
          body { text-align:center; font-family:sans-serif; padding:22px; color:#111; }
          #qr { display:flex; justify-content:center; margin:16px 0 10px; }
          #qrText { overflow-wrap:anywhere; font-size:12px; color:#666; line-height:1.35; }
          #validity { margin-top:8px; color:#166534; font-weight:700; }
          #error { color:#b91c1c; font-weight:700; }
        </style>
      </head>
      <body>
        <h3 id="title">Loading QR...</h3>
        <div id="qr"></div>
        <div id="validity"></div>
        <p id="qrText"></p>
        <p id="error"></p>
        <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"><\/script>
        <script>
          const studentRef = ${JSON.stringify(String(id))};
          let currentQrData = '';

          function authHeaders() {
            return {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + (window.opener && window.opener.localStorage
                ? window.opener.localStorage.getItem('token')
                : localStorage.getItem('token'))
            };
          }

          async function loadQr() {
            try {
              const response = await fetch('/api/qr?student_id=' + encodeURIComponent(studentRef), {
                headers: authHeaders()
              });
              const data = await response.json();
              if (!data || !data.qr_data) throw new Error(data && data.error ? data.error : 'QR load failed');
              document.getElementById('title').textContent = 'QR Code - ' + data.student_id;
              document.getElementById('error').textContent = '';
              document.getElementById('validity').textContent = 'Static QR';
              if (data.qr_data !== currentQrData) {
                currentQrData = data.qr_data;
                const host = document.getElementById('qr');
                host.innerHTML = '';
                new QRCode(host, { text: currentQrData, width:256, height:256 });
                document.getElementById('qrText').textContent = currentQrData;
              }
            } catch (error) {
              document.getElementById('error').textContent = error.message || 'Unable to load QR';
            }
          }
          loadQr();
        <\/script>
      </body>
      </html>`);
    win.document.close();
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const course = document.getElementById('courseFilter').value;
    const year = document.getElementById('yearFilter').value;
    const filtered = studentsData.filter(s => {
      const matchesSearch = [s.student_id, s.full_name, s.college, s.course, s.specialization, s.year_level, s.section, s.email]
        .join(' ').toLowerCase().includes(q);
      const matchesCourse = !course || s.course === course;
      const matchesYear = !year || String(s.year_level || '') === year;
      return matchesSearch && matchesCourse && matchesYear;
    });
    renderStudents(filtered);
  }
</script>
</body>
